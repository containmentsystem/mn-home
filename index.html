<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Braille Orbit Letters</title>

<style>
html,body{
  height:100%;
  margin:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.stage{
  width:min(70vmin,520px);
  height:min(70vmin,520px);
  position:relative;
}

.rotator{
  width:100%;
  height:100%;
  position:relative;
  animation:spin 14s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.dot{
  position:absolute;
  width:4vmin;
  height:4vmin;
  max-width:26px;
  max-height:26px;
  background:black;
  border-radius:50%;
  transform:translate(-50%,-50%);
  opacity:1;
  transition:
    left .8s cubic-bezier(.4,0,.2,1),
    top .8s cubic-bezier(.4,0,.2,1),
    opacity .5s ease;
}
</style>
</head>
<body>
<div class="stage">
  <div class="rotator" id="rotator"></div>
</div>

<script>
const rotator=document.getElementById("rotator")
const DOTS=10
const dots=[]
const radius=42

// Letters sequence
const letters = ["M","N","E","M","O","S","Y","N","E"]

// Braille positions 2x3
const braillePos=[
  [42,30],[58,30],
  [42,50],[58,50],
  [42,70],[58,70]
]

// Standard English Braille
const brailleLetters = {
"M":[1,3,4],
"N":[1,3,4,5],
"E":[1,5],
"O":[1,3,5],
"S":[2,3,4],
"Y":[1,3,4,5,6]
}

let index=0
let hovering=false

// Create dots
for(let i=0;i<DOTS;i++){
  const d=document.createElement("div")
  d.className="dot"
  rotator.appendChild(d)
  dots.push(d)
}

// Ring layout
function ringLayout(){
  dots.forEach((dot,i)=>{
    const angle=(i/DOTS)*Math.PI*2
    const x=50+radius*Math.cos(angle)
    const y=50+radius*Math.sin(angle)
    dot.style.left=x+"%"
    dot.style.top=y+"%"
    dot.style.opacity=1
    dot.style.transitionDelay="0s"
  })
}

// Braille layout
function brailleLayout(letter){
  const pattern = brailleLetters[letter]
  dots.forEach((dot,i)=>{
    if(i < pattern.length){
      const pos = braillePos[pattern[i]-1]
      dot.style.left=pos[0]+"%"
      dot.style.top=pos[1]+"%"
      dot.style.opacity=1
    } else {
      dot.style.opacity=0
    }
    dot.style.transitionDelay=(i*0.05)+"s"
  })
}

rotator.addEventListener("mouseenter",()=>{
  hovering=true
  brailleLayout(letters[index])
})

rotator.addEventListener("mouseleave",()=>{
  hovering=false
  ringLayout()
})

rotator.addEventListener("click",()=>{
  if(!hovering) return
  index=(index+1)%letters.length
  brailleLayout(letters[index])
})

ringLayout()
</script>
</body>
</html>
